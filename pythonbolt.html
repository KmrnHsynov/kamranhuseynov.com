<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>PythonBolt</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css"/>
  <link  rel="stylesheet" href="pythonbolt.css"/>
</head>
<body>

<div id="topbar">
  <a href="proyektlər.html" id="home-link">← Proyektlər</a>
  <h1>🐍 PythonBolt</h1>
  <button class="lang-btn active" id="btn-az" onclick="setLang('az')">AZ</button>
  <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
  <div id="progress-bar-wrap"><div id="progress-bar-fill" style="width:0%"></div></div>
  <span id="progress-text">0/0</span>
</div>

<div id="main">
  <div id="sidebar">
    <h3 id="sidebar-title">Dərslər</h3>
    <div id="lesson-list"></div>
  </div>

  <div id="content">
    <div id="lesson-panel">
      <h2 id="lesson-title"></h2>
      <div class="lesson-meta" id="lesson-meta"></div>
      <div class="lesson-body"  id="lesson-body"></div>
      <div class="task-box"     id="task-box">
        <h4 id="task-label">Tapşırıq</h4>
        <p  id="task-text"></p>
      </div>
    </div>

    <div id="exercise-panel">
      <div id="ex-header">
        <h3 id="ex-title">Məşq 1</h3>
        <div id="ex-nav"></div>
      </div>
      <div id="editor-wrap"><textarea id="editor"></textarea></div>
      <div id="output-bar">
        <div id="run-row">
          <button id="run-btn"   onclick="runCode()">▶ Run</button>
          <button id="reset-btn" onclick="resetCode()">↺ Reset</button>
          <button id="hint-btn"  onclick="showHint()">💡 Hint</button>
          <span   id="feedback"></span>
        </div>
        <div id="output"><span class="out-info">▶ Run your code...</span></div>
      </div>
    </div>
  </div>
</div>

<!-- Mobile bottom tab bar (hidden on desktop via CSS) -->
<div id="mobile-tabs">
  <button class="mob-tab" data-view="sidebar" onclick="setMobileView('sidebar')">
    <span class="tab-icon">📚</span>
    <span>Dərslər</span>
  </button>
  <button class="mob-tab" data-view="lesson" onclick="setMobileView('lesson')">
    <span class="tab-icon">📖</span>
    <span>Dərs</span>
  </button>
  <button class="mob-tab" data-view="code" onclick="setMobileView('code')">
    <span class="tab-icon">💻</span>
    <span>Kod</span>
  </button>
</div>

<div id="pyodide-status">⏳ Python loading...</div>

<script src="pythonbolt.js"></script>
</body>
</html>
