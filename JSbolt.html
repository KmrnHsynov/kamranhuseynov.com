<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JSBolt</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
#topbar{background:#161b22;border-bottom:1px solid #30363d;padding:0 12px;display:flex;align-items:center;gap:8px;height:48px;flex-shrink:0}
#topbar h1{font-size:16px;font-weight:700;background:linear-gradient(135deg,#f7df1e,#f0a500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.lang-btn{background:transparent;border:1px solid #30363d;color:#8b949e;padding:3px 8px;border-radius:6px;cursor:pointer;font-size:11px}
.lang-btn.active{border-color:#f7df1e;color:#f7df1e}
#progress-bar-wrap{flex:1;height:5px;background:#30363d;border-radius:99px;overflow:hidden}
#progress-bar-fill{height:100%;background:linear-gradient(90deg,#f7df1e,#f0a500);border-radius:99px;transition:width .4s}
#progress-text{font-size:11px;color:#8b949e;white-space:nowrap}
#menu-btn{display:none;background:transparent;border:1px solid #30363d;color:#8b949e;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:16px;line-height:1}

/* ── LAYOUT ── */
#main{display:flex;flex:1;overflow:hidden;position:relative}

/* ── SIDEBAR ── */
#sidebar{width:200px;background:#0d1117;border-right:1px solid #30363d;overflow-y:auto;flex-shrink:0;transition:transform .25s}
#sidebar h3{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#8b949e;padding:12px 14px 6px}
.lesson-item{padding:9px 14px;cursor:pointer;font-size:12px;color:#8b949e;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px}
.lesson-item:hover{background:#161b22;color:#e6edf3}
.lesson-item.active{background:#161b22;border-left-color:#f7df1e;color:#f7df1e}
.lesson-item .check{color:#3fb950;font-size:11px;margin-left:auto}
.lesson-item .num{font-size:10px;color:#484f58;min-width:16px}
.section-header{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#484f58;padding:10px 14px 4px;margin-top:4px}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:49}

/* ── CONTENT ── */
#content{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── TABS (mobile) ── */
#tabs{display:none;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0}
#tabs button{flex:1;padding:10px;background:transparent;border:none;color:#8b949e;font-size:13px;cursor:pointer;border-bottom:2px solid transparent}
#tabs button.active{color:#f7df1e;border-bottom-color:#f7df1e}

/* ── DESKTOP: side-by-side ── */
#split{flex:1;display:flex;overflow:hidden}
#lesson-panel{width:44%;overflow-y:auto;padding:20px 24px;border-right:1px solid #30363d;flex-shrink:0}
#lesson-panel h2{font-size:19px;font-weight:700;margin-bottom:4px}
.lesson-meta{font-size:11px;color:#8b949e;margin-bottom:14px}
.lesson-body{font-size:13px;line-height:1.75;color:#c9d1d9}
.lesson-body p{margin-bottom:12px}
.lesson-body pre{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:11px 13px;font-family:'Courier New',monospace;font-size:12px;overflow-x:auto;margin-bottom:12px;color:#f0f6fc;line-height:1.6}
.kw{color:#ff7b72}.str{color:#a5d6ff}.fn{color:#d2a8ff}.cm{color:#6e7681}.num{color:#79c0ff}.bi{color:#ffa657}
.task-box{background:#161b22;border:1px solid #30363d;border-left:3px solid #f7df1e;border-radius:8px;padding:13px 15px;margin-top:18px}
.task-box h4{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#f7df1e;margin-bottom:6px}
.task-box p{font-size:13px;color:#e6edf3;line-height:1.6}

#exercise-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#ex-header{padding:9px 14px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
#ex-header h3{font-size:13px;font-weight:600}
#ex-nav{display:flex;gap:5px;flex-wrap:wrap}
.ex-dot{width:24px;height:24px;border-radius:50%;border:2px solid #30363d;background:transparent;color:#8b949e;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ex-dot.active{border-color:#f7df1e;color:#f7df1e;background:#f7df1e18}
.ex-dot.done{border-color:#3fb950;background:#3fb95022;color:#3fb950}

#editor-wrap{flex:1;overflow:hidden;position:relative}
.CodeMirror{height:100%!important;font-size:13px;font-family:'Courier New',monospace}

#output-bar{height:140px;flex-shrink:0;border-top:1px solid #30363d;display:flex;flex-direction:column}
#run-row{display:flex;align-items:center;gap:7px;padding:6px 10px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;flex-wrap:wrap}
#run-btn{background:linear-gradient(135deg,#f7df1e,#f0a500);border:none;color:#0d1117;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700}
#reset-btn{background:transparent;border:1px solid #30363d;color:#8b949e;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:11px}
#hint-btn{background:transparent;border:1px solid #d2940022;color:#d29400;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:11px}
#feedback{font-size:11px;display:flex;align-items:center;gap:4px;margin-left:auto}
.fb-pass{color:#3fb950}.fb-hint{color:#d29922}
#output{flex:1;overflow-y:auto;padding:7px 11px;font-family:'Courier New',monospace;font-size:12px;background:#0d1117;line-height:1.5}
.out-ok{color:#e6edf3}.out-err{color:#ff7b72}.out-info{color:#484f58}

/* ══════════════════════════════════
   MOBILE  ≤ 700px
══════════════════════════════════ */
@media(max-width:700px){
  #menu-btn{display:block}
  #progress-bar-wrap{max-width:80px}

  /* sidebar slides in as drawer */
  #sidebar{
    position:fixed;top:0;left:0;height:100%;width:75%;max-width:260px;
    z-index:50;transform:translateX(-100%);
    border-right:1px solid #30363d;
    background:#0d1117;
  }
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.open{display:block}

  /* tabs replace the side-by-side split */
  #tabs{display:flex}
  #split{flex-direction:column}

  /* lesson panel fills screen on its tab */
  #lesson-panel{
    width:100%;border-right:none;
    padding:16px;flex-shrink:0;
    display:none;
  }
  #lesson-panel.tab-active{display:block;overflow-y:auto;flex:1}

  /* exercise panel fills screen on its tab */
  #exercise-panel{display:none}
  #exercise-panel.tab-active{display:flex}

  #output-bar{height:130px}
  .CodeMirror{font-size:12px}
}
</style>
</head>
<body>
<div id="topbar">
  <button id="menu-btn" onclick="toggleSidebar()">☰</button>
  <h1>⚡ JSBolt</h1>
  <button class="lang-btn active" id="btn-az" onclick="setLang('az')">AZ</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  <div id="progress-bar-wrap"><div id="progress-bar-fill" style="width:0%"></div></div>
  <span id="progress-text">0/0</span>
</div>

<div id="main">
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div id="sidebar">
    <h3 id="sidebar-title">Dərslər</h3>
    <div id="lesson-list"></div>
  </div>

  <div id="content">
    <!-- Mobile tabs -->
    <div id="tabs">
      <button id="tab-lesson" class="active" onclick="switchTab('lesson')">📖 Dərs</button>
      <button id="tab-code" onclick="switchTab('code')">💻 Kod</button>
    </div>

    <div id="split">
      <div id="lesson-panel" class="tab-active">
        <h2 id="lesson-title"></h2>
        <div class="lesson-meta" id="lesson-meta"></div>
        <div class="lesson-body" id="lesson-body"></div>
        <div class="task-box">
          <h4 id="task-label">Tapşırıq</h4>
          <p id="task-text"></p>
        </div>
        <!-- Mobile: button to jump to code tab -->
        <button id="to-code-btn" onclick="switchTab('code')" style="display:none;margin-top:16px;width:100%;padding:10px;background:linear-gradient(135deg,#f7df1e,#f0a500);border:none;border-radius:8px;color:#0d1117;font-weight:700;font-size:14px;cursor:pointer">💻 Kodu yaz →</button>
      </div>

      <div id="exercise-panel">
        <div id="ex-header">
          <h3 id="ex-title">Məşq 1</h3>
          <div id="ex-nav"></div>
        </div>
        <div id="editor-wrap"><textarea id="editor"></textarea></div>
        <div id="output-bar">
          <div id="run-row">
            <button id="run-btn" onclick="runCode()">▶ Run</button>
            <button id="reset-btn" onclick="resetCode()">↺</button>
            <button id="hint-btn" onclick="showHint()">💡</button>
            <span id="feedback"></span>
          </div>
          <div id="output"><span class="out-info">▶ Run your code...</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let lang='az';
function setLang(l){lang=l;document.getElementById('btn-az').classList.toggle('active',l==='az');document.getElementById('btn-en').classList.toggle('active',l==='en');renderSidebar();loadLesson(curLesson);}
function t(az,en){return lang==='az'?az:en}

// ── Mobile helpers ────────────────────────────────────
function isMobile(){return window.innerWidth<=700}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

let activeTab='lesson';
function switchTab(tab){
  activeTab=tab;
  document.getElementById('tab-lesson').classList.toggle('active',tab==='lesson');
  document.getElementById('tab-code').classList.toggle('active',tab==='code');
  document.getElementById('lesson-panel').classList.toggle('tab-active',tab==='lesson');
  document.getElementById('exercise-panel').classList.toggle('tab-active',tab==='code');
  if(tab==='code'&&cm)setTimeout(()=>cm.refresh(),50);
}

function showMobileCodeBtn(show){
  const b=document.getElementById('to-code-btn');
  if(b)b.style.display=show?'block':'none';
}

 meta:{az:'Dərs 1 · 5 dəq',en:'Lesson 1 · 5 min'},
 body:{
  az:`<p>JavaScript-də dəyişən elan etmək üçün üç açar söz var:</p>
<pre><span class="kw">let</span> ad = <span class="str">"Kənan"</span>       <span class="cm">// dəyişdirilə bilər</span>
<span class="kw">const</span> PI = <span class="num">3.14</span>      <span class="cm">// sabit, dəyişdirilməz</span>
<span class="kw">var</span> yas = <span class="num">22</span>         <span class="cm">// köhnə üsul</span></pre>
<p>Müasir JS-də <b>let</b> və <b>const</b> istifadə edin.</p>
<pre><span class="kw">let</span> x = <span class="num">10</span>
x = <span class="num">20</span>   <span class="cm">// ✅ let dəyişdirilə bilər</span>
<span class="kw">const</span> Y = <span class="num">10</span>
<span class="cm">// Y = 20  ← ❌ XƏTA!</span></pre>
<p>Şablon sətri (template literal):</p>
<pre><span class="kw">const</span> salam = <span class="str">\`Ad: \${ad}, Yaş: \${yas}\`</span>
<span class="fn">console</span>.<span class="fn">log</span>(salam)</pre>`,
  en:`<p>JavaScript has three ways to declare variables:</p>
<pre><span class="kw">let</span> name = <span class="str">"Kenan"</span>     <span class="cm">// can be reassigned</span>
<span class="kw">const</span> PI = <span class="num">3.14</span>      <span class="cm">// constant, cannot change</span>
<span class="kw">var</span> age = <span class="num">22</span>         <span class="cm">// old style, avoid</span></pre>
<p>In modern JS, prefer <b>let</b> and <b>const</b>.</p>
<pre><span class="kw">let</span> x = <span class="num">10</span>

<pre><span class="kw">const</span> msg = <span class="str">\`Name: \${name}, Age: \${age}\`</span>

  <span class="kw">default</span>: <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Digər"</span>)
}</pre>
<p>Müqayisə: <b>===</b> <b>!==</b> <b>&gt;</b> <b>&lt;</b> <b>&amp;&amp;</b> <b>||</b> <b>!</b></p>`,
  en:`<pre><span class="kw">if</span> (age >= <span class="num">18</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Adult"</span>)
} <span class="kw">else if</span> (age >= <span class="num">13</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Teenager"</span>)
} <span class="kw">else</span> {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Child"</span>)
}</pre>
<p>Ternary: <code>condition ? true : false</code></p>
<pre><span class="kw">const</span> type = n % <span class="num">2</span> === <span class="num">0</span> ? <span class="str">"Even"</span> : <span class="str">"Odd"</span></pre>

<pre><span class="kw">switch</span>(day) {

  <span class="kw">default</span>: <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Other"</span>)
}</pre>

}
<span class="cm">// Arrow</span>
<span class="kw">const</span> <span class="fn">add</span> = (a,b) => a+b
<span class="cm">// Default param</span>
<span class="kw">const</span> <span class="fn">power</span> = (x,exp=<span class="num">2</span>) => x**exp</pre>

<pre><span class="kw">const</span> <span class="fn">operate</span> = (a,b,fn) => fn(a,b)

// ── JS Runner ─────────────────────────────────────────
function runJS(code){
  const lines=[];
  const fakeConsole={log:(...args)=>lines.push(args.map(a=>{
    if(a===null)return'null';
    if(typeof a==='object'){try{return JSON.stringify(a)}catch{return String(a)}}
    return String(a)
  }).join(' '))};
  try{new Function('console',code)(fakeConsole)}
  catch(e){lines.push('❌ '+e.message)}
  return lines;
}

// ── STATE ─────────────────────────────────────────────
let curLesson=0,curExercise=0,done={},cm;
const totalEx=()=>curriculum.reduce((a,l)=>a+l.exercises.length,0);
const compEx=()=>Object.values(done).reduce((a,v)=>a+v.length,0);

function renderSidebar(){
  document.getElementById('sidebar-title').textContent=t('Dərslər','Lessons');
  const list=document.getElementById('lesson-list');list.innerHTML='';
  let lastSec='';
  curriculum.forEach((l,i)=>{
    if(l.section&&l.section[lang]!==lastSec){
      lastSec=l.section[lang];
      const sh=document.createElement('div');sh.className='section-header';sh.textContent=lastSec;list.appendChild(sh);
    }
    const allDone=(done[l.id]||[]).length===l.exercises.length;
    const d=document.createElement('div');
    d.className='lesson-item'+(i===curLesson?' active':'');
    d.innerHTML=`<span class="num">${i}</span>${l.title[lang]}${allDone?'<span class="check">✓</span>':''}`;
    d.onclick=()=>{curLesson=i;curExercise=0;loadLesson(i);if(isMobile())closeSidebar();};
    list.appendChild(d);
  });
  const comp=compEx(),total=totalEx();
  document.getElementById('progress-text').textContent=`${comp}/${total}`;
  document.getElementById('progress-bar-fill').style.width=`${total?Math.round(comp/total*100):0}%`;
}

function loadLesson(i){
  curLesson=i;curExercise=0;
  const l=curriculum[i];
  document.getElementById('lesson-title').textContent=l.title[lang];
  document.getElementById('lesson-meta').textContent=l.meta[lang];
  document.getElementById('lesson-body').innerHTML=l.body[lang];
  document.getElementById('task-label').textContent=t('Tapşırıq','Exercise');
  showMobileCodeBtn(isMobile());
  // on mobile, switch to lesson tab when loading a new lesson
  if(isMobile()) switchTab('lesson');
  loadExercise(0);renderSidebar();
}

function loadExercise(ei){
  curExercise=ei;
  const ex=curriculum[curLesson].exercises[ei];
  document.getElementById('task-text').textContent=ex.task[lang];
  document.getElementById('ex-title').textContent=t(`Məşq ${ei+1}`,`Exercise ${ei+1}`);
  if(cm){const saved=getSaved(curLesson,ei);cm.setValue(saved||ex.starter);}
  document.getElementById('output').innerHTML=`<span class="out-info">▶ ${t('Kodu işlət','Run your code')}</span>`;
  document.getElementById('feedback').textContent='';
  renderExNav();
}

function renderExNav(){
  const nav=document.getElementById('ex-nav');nav.innerHTML='';
  curriculum[curLesson].exercises.forEach((_,ei)=>{
    const b=document.createElement('button');
    b.className='ex-dot'+(ei===curExercise?' active':'')+((done[curLesson]||[]).includes(ei)?' done':'');
    b.textContent=ei+1;b.onclick=()=>loadExercise(ei);nav.appendChild(b);
  });
}

const getSaved=(l,e)=>{try{return localStorage.getItem(`jsb2_${l}_${e}`)}catch{return null}};
const setSaved=(l,e,v)=>{try{localStorage.setItem(`jsb2_${l}_${e}`,v)}catch{}};

window.addEventListener('DOMContentLoaded',()=>{
  cm=CodeMirror.fromTextArea(document.getElementById('editor'),{
    mode:'javascript',theme:'dracula',lineNumbers:true,indentUnit:2,
    extraKeys:{"Tab":cm=>cm.replaceSelection("  ")}
  });
  cm.on('change',()=>setSaved(curLesson,curExercise,cm.getValue()));
  loadLesson(0);renderSidebar();
  document.getElementById('output').innerHTML=`<span class="out-info">${t('Hazırdır. Kodu yazıb işlət!','Ready. Write and run!')}</span>`;
  // show mobile btn if needed
  showMobileCodeBtn(isMobile());
  window.addEventListener('resize',()=>{
    showMobileCodeBtn(isMobile());
    if(!isMobile()){
      document.getElementById('lesson-panel').classList.add('tab-active');
      document.getElementById('exercise-panel').classList.add('tab-active');
    }
  });
});

function runCode(){
  const code=cm.getValue();
  const outEl=document.getElementById('output'),fbEl=document.getElementById('feedback');
  outEl.innerHTML='';fbEl.textContent='';
  const lines=runJS(code);
  lines.forEach(line=>{
    const d=document.createElement('div');
    d.className=line.startsWith('❌')?'out-err':'out-ok';
    d.textContent=line;outEl.appendChild(d);
  });
  if(!lines.length)outEl.innerHTML=`<span class="out-info">${t('Çıxış yoxdur.','No output.')}</span>`;
  setSaved(curLesson,curExercise,code);
  const ex=curriculum[curLesson].exercises[curExercise];
  const combined=lines.join('\n');
  if(!combined.includes('❌')&&ex.check(combined)){
    fbEl.innerHTML=`<span class="fb-pass">✅ ${t('Düzgündür!','Correct!')}</span>`;
    if(!done[curLesson])done[curLesson]=[];
    if(!done[curLesson].includes(curExercise))done[curLesson].push(curExercise);
    renderExNav();renderSidebar();
    setTimeout(()=>{
      const ne=curExercise+1,nl=curLesson+1;
      if(ne<curriculum[curLesson].exercises.length)loadExercise(ne);
      else if(nl<curriculum.length){curLesson=nl;loadLesson(nl);}
    },1400);
  } else if(!combined.includes('❌')){
    fbEl.innerHTML=`<span class="fb-hint">💡 ${ex.hint[lang]}</span>`;
  }
}

function resetCode(){
  cm.setValue(curriculum[curLesson].exercises[curExercise].starter);
  document.getElementById('output').innerHTML=`<span class="out-info">↺ ${t('Sıfırlandı.','Reset.')}</span>`;
  document.getElementById('feedback').textContent='';
}

function showHint(){
  document.getElementById('feedback').innerHTML=`<span class="fb-hint">💡 ${curriculum[curLesson].exercises[curExercise].hint[lang]}</span>`;
}
</script>
