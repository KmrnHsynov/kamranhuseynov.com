<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a73e8">
  <title>İngiliscə Öyrən</title>
  <link rel="stylesheet" href="ingilisce.css">
</head>
<body>

  <header class="app-header">
    <h1 class="app-title">İngiliscə Öyrən</h1>
    <div class="header-right">
      <span class="streak-display" id="streakDisplay"></span>
      <button class="profile-btn" id="profileBtn"><span id="profileName"></span></button>
      <div class="profile-dropdown hidden" id="profileDropdown">
        <div class="profile-dropdown-avatar" id="dropdownAvatar"></div>
        <div class="profile-dropdown-name" id="dropdownName"></div>
        <div class="profile-dropdown-stats">
          <div class="dropdown-stat">
            <span class="dropdown-stat-value" id="dropdownCompleted">0</span>
            <span class="dropdown-stat-label">tamamlandı</span>
          </div>
          <div class="dropdown-stat-divider"></div>
          <div class="dropdown-stat">
            <span class="dropdown-stat-value" id="dropdownTotal">0</span>
            <span class="dropdown-stat-label">ümumi dərs</span>
          </div>
          <div class="dropdown-stat-divider"></div>
          <div class="dropdown-stat">
            <span class="dropdown-stat-value" id="dropdownLives">❤️❤️❤️❤️❤️</span>
            <span class="dropdown-stat-label">can</span>
          </div>
          <div class="dropdown-stat-divider"></div>
          <div class="dropdown-stat">
            <span class="dropdown-stat-value" id="dropdownStreak">🔥 0</span>
            <span class="dropdown-stat-label">gün ardıcıl</span>
          </div>
        </div>
        <div class="dropdown-progress-bar-track">
          <div class="dropdown-progress-bar-fill" id="dropdownProgressFill"></div>
        </div>
        <hr class="profile-dropdown-divider">
        <button class="profile-dropdown-signout" id="btnSignOut">Çıxış et</button>
      </div>
      <button class="mode-toggle" id="modeToggle">SAT Rejimi</button>
    </div>
  </header>

  <main class="path-container" id="pathContainer"></main>
  <button class="resume-btn hidden" id="resumeBtn">▶ Davam et</button>

  <!-- Profil / Auth -->
  <div class="profile-overlay hidden" id="profileOverlay">
    <div class="profile-modal">
      <h2>👋 Xoş gəldiniz!</h2>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabSignup">Yeni hesab</button>
        <button class="auth-tab" id="tabSignin">Daxil ol</button>
      </div>

      <!-- Sign Up -->
      <div id="formSignup">
        <div class="avatar-picker">
          <button class="avatar-option selected" data-avatar="👦">👦<span class="avatar-label">Oğlan</span></button>
          <button class="avatar-option" data-avatar="👧">👧<span class="avatar-label">Qız</span></button>
        </div>
        <input type="text"     id="signupName"     class="profile-input" placeholder="Adınız..."                          maxlength="24" />
        <input type="password" id="signupPassword" class="profile-input" placeholder="Şifrə (8+, böyük hərf, simvol)"               />
        <input type="password" id="signupConfirm"  class="profile-input" placeholder="Şifrəni təsdiqləyin"                           />
        <div class="auth-error hidden" id="signupError"></div>
        <button class="btn-primary auth-btn" id="btnSignup">Hesab yarat</button>
      </div>

      <!-- Sign In -->
      <div id="formSignin" class="hidden">
        <input type="text"     id="signinName"     class="profile-input" placeholder="Adınız..."   />
        <input type="password" id="signinPassword" class="profile-input" placeholder="Şifrəniz..." />
        <div class="auth-error hidden" id="signinError"></div>
        <button class="btn-primary auth-btn" id="btnSignin">Daxil ol</button>
      </div>
    </div>
  </div>

  <!-- Dərs Modalı -->
  <div class="modal-overlay hidden" id="lessonOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="lessonTitle"></h2>
        <button class="modal-close" id="lessonClose">✕</button>
      </div>
      <div class="lives-bar" id="lessonLives"></div>
      <div class="modal-body" id="lessonBody"></div>
      <div class="modal-footer" id="lessonFooter"></div>
    </div>
  </div>

  <!-- Quiz Modalı -->
  <div class="modal-overlay hidden" id="quizOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="quiz-progress" id="quizProgress"></span>
        <button class="modal-close" id="quizClose">✕</button>
      </div>
      <div class="lives-bar" id="quizLives"></div>
      <div class="modal-body" id="quizBody"></div>
      <div class="modal-footer">
        <button class="btn-primary" id="quizCheck" disabled>Yoxla</button>
      </div>
    </div>
  </div>

  <!-- Uğur Bildirişi -->
  <div class="modal-overlay hidden" id="celebrationOverlay">
    <div class="modal celebration-modal">
      <div class="celebration-icon">🎉</div>
      <h2 id="celebrationTitle">Əla!</h2>
      <p id="celebrationText"></p>
      <button class="btn-primary" id="celebrationClose">Davam et</button>
    </div>
  </div>

  <!-- Can Bitdi -->
  <div class="modal-overlay hidden" id="failOverlay">
    <div class="modal celebration-modal">
      <div class="celebration-icon">💔</div>
      <h2>Canlar Bitdi</h2>
      <p>5 can yeniləndi. Dərsi yenidən oxu.</p>
      <button class="btn-primary" id="failClose">Yenidən başla</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="ingilisce.js"></script>
</body>
</html>
